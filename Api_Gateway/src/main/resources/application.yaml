spring:
  application:
    name: Api_Gateway
  jmx:
    default-domain:



  #api gateway config
  cloud:
    gateway:
      routes:
        - id: Order_Service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2
            - RedirectTo=302, http://codingshuttle.com
        - id: Inventory_Service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Custom-Header , Manish

server:
  port: 8082


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka